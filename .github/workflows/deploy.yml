name: Deploy to Server

on:
  push:
    branches:
      - main
  
jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Ruff
        run: pip install ruff
        
      - name: Run Ruff
        run: ruff check .



  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/edweiss200/mocky-backend:latest

      - name: Build and push TG Bot
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/edweiss200/mocky-tg-bot:latest




  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploying project via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/opt/mocky
            git pull origin main
            docker compose pull
            docker compose up -d