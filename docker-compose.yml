

networks:
  dev:

services:

  backend:
    build: ./backend

    command: bash -c 'while !</dev/tcp/db/5432; do sleep 1; done; cd src && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000'
    volumes:

      - ./backend:/app
    ports:
      - "8008:8000"
    environment:

      - DATABASE_URL=postgresql+asyncpg://postgres:12345@db:5432/edweissth
    depends_on:
      - db
    networks:
      - dev

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=mockybd
    networks:
      - dev

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data: